<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMR Cap+ — Debrief</title>
<link rel="stylesheet" href="/assets/style.css">
<script src="/assets/shared.js" defer></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
/* Tokens (--bg, --blue, ...) come from /assets/style.css. */
body { font-family: ui-monospace, 'Cascadia Code', monospace;
       background: var(--bg); color: var(--text); font-size: 12px;
       height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
header {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 10px 16px; display: flex; align-items: center; gap: 16px;
  flex-shrink: 0;
}
header h1 { font-size: 14px; font-weight: 700; color: var(--blue); }
header .meta { margin-left: auto; color: var(--muted); font-size: 11px; }
header .meta span { color: var(--text); }

#filters {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 10px 16px; display: flex; flex-wrap: wrap; gap: 10px;
  align-items: end; flex-shrink: 0;
}
.f-group { display: flex; flex-direction: column; gap: 3px; }
.f-group label { color: var(--muted); font-size: 10px;
                 text-transform: uppercase; letter-spacing: .05em; }
.f-group input, .f-group select {
  background: var(--bg3); color: var(--text);
  border: 1px solid var(--border); border-radius: 4px;
  padding: 4px 8px; font-family: inherit; font-size: 12px;
}
.f-group input[type="number"] { width: 100px; }
.f-group input[type="datetime-local"] { width: 180px; }
.f-group select { width: 130px; }
.f-actions { display: flex; gap: 8px; margin-left: auto; }
.btn {
  background: var(--bg3); color: var(--text);
  border: 1px solid var(--border); border-radius: 4px;
  padding: 6px 14px; font-family: inherit; font-size: 12px; cursor: pointer;
}
.btn:hover { border-color: var(--blue); color: var(--blue); }
.btn.primary { background: #1c2d45; border-color: var(--blue); color: var(--blue); }
.btn.primary:hover { background: #2a3f5c; }

#summary {
  padding: 6px 16px; background: var(--bg2);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
  color: var(--muted); font-size: 11px;
}
#summary span { color: var(--text); font-weight: 600; }
#summary .truncated { color: var(--yellow); }

#table-wrap { flex: 1; overflow: auto; }
table { width: 100%; border-collapse: collapse; }
thead { position: sticky; top: 0; background: var(--bg2); z-index: 1; }
th {
  padding: 6px 10px; text-align: left; font-size: 10px; font-weight: 600;
  color: var(--muted); text-transform: uppercase; letter-spacing: .05em;
  border-bottom: 1px solid var(--border); white-space: nowrap;
}
td {
  padding: 5px 10px; border-bottom: 1px solid var(--border);
  white-space: nowrap; vertical-align: top;
}
tr:hover td { background: var(--bg3); }
.t-time { color: var(--blue); }
.t-type {
  display: inline-block; padding: 1px 6px; border-radius: 3px;
  font-size: 10px; font-weight: 600; border: 1px solid;
}
.t-type.voice_call    { color: var(--green);  border-color: var(--green); }
.t-type.lrrp_position { color: var(--purple); border-color: var(--purple); }
.t-type.encryption    { color: var(--purple); border-color: var(--purple); }
.t-type.quality       { color: var(--red);    border-color: var(--red); }
.t-type.preamble_csbk,
.t-type.data_header,
.t-type.ip_mapping,
.t-type.lrrp_request  { color: var(--yellow); border-color: var(--yellow); }
.t-type.site_info,
.t-type.channel_status,
.t-type.lsn_status,
.t-type.bank_call     { color: var(--muted);  border-color: var(--border); }
.t-raw {
  color: var(--muted); font-size: 11px;
  max-width: 480px; overflow: hidden; text-overflow: ellipsis;
}
.muted { color: var(--muted); }
.empty { padding: 60px; text-align: center; color: var(--muted); }

#pager {
  padding: 8px 16px; background: var(--bg2);
  border-top: 1px solid var(--border); flex-shrink: 0;
  display: flex; align-items: center; gap: 12px;
}
#pager button { padding: 4px 10px; }
#pager .info { color: var(--muted); font-size: 11px; margin-left: auto; }
</style>
</head>
<body class="page-debrief">

<header>
  <h1>DMR Cap+ Debrief</h1>
  <nav class="nav" data-shared-nav></nav>
  <div class="meta">
    Source: <span>events on disk</span>
    <span id="m-version" style="margin-left:12px"></span>
  </div>
</header>

<form id="filters" onsubmit="event.preventDefault(); resetAndSearch();">
  <div class="f-group">
    <label for="f-from">From</label>
    <input id="f-from" type="datetime-local" step="1">
  </div>
  <div class="f-group">
    <label for="f-to">To</label>
    <input id="f-to" type="datetime-local" step="1">
  </div>
  <div class="f-group">
    <label for="f-src">SRC radio</label>
    <input id="f-src" type="number" placeholder="any">
  </div>
  <div class="f-group">
    <label for="f-tgt">Target / TG</label>
    <input id="f-tgt" type="number" placeholder="any">
  </div>
  <div class="f-group">
    <label for="f-types">Types</label>
    <select id="f-types">
      <option value="">all</option>
      <option value="voice_call,lrrp_position,encryption,quality" selected>traffic</option>
      <option value="voice_call">voice only</option>
      <option value="lrrp_position">positions</option>
      <option value="encryption">encryption</option>
      <option value="quality">errors</option>
      <option value="data_header,preamble_csbk,ip_mapping,lrrp_request">data/csbk</option>
      <option value="site_info,channel_status,lsn_status,bank_call">control-chan</option>
    </select>
  </div>
  <div class="f-group">
    <label for="f-limit">Limit</label>
    <!-- Server clamps /api/history at 2000; huge single-page dumps moved
         to the streaming CSV/NDJSON exports. -->
    <select id="f-limit">
      <option value="100">100</option>
      <option value="500" selected>500</option>
      <option value="1000">1000</option>
      <option value="2000">2000</option>
    </select>
  </div>
  <div class="f-actions">
    <button type="button" class="btn" id="btn-clear">Clear</button>
    <button type="button" class="btn" id="btn-csv">⤓ Export CSV</button>
    <button type="submit" class="btn primary">Search</button>
  </div>
</form>

<div id="summary">
  Showing <span id="s-count">0</span> events ·
  offset <span id="s-offset">0</span>
  <span id="s-truncated" class="truncated" style="display:none">
    · ⚠ result limit reached, narrow the filter
  </span>
</div>

<div id="table-wrap">
  <table>
    <thead>
      <tr>
        <th style="width:140px">Time</th>
        <th style="width:130px">Type</th>
        <th style="width:80px">SRC</th>
        <th style="width:80px">TGT</th>
        <th style="width:60px">Slot</th>
        <th>Summary</th>
        <th>Raw</th>
      </tr>
    </thead>
    <tbody id="rows">
      <tr><td colspan="7" class="empty">Set filters and click Search.</td></tr>
    </tbody>
  </table>
</div>

<div id="pager">
  <button class="btn" id="btn-prev" disabled>← Prev</button>
  <button class="btn" id="btn-next" disabled>Next →</button>
  <div class="info">
    Page size = limit. JSONL is scanned linearly; deeper offsets cost more.
  </div>
</div>

<script>
const els = {
  from: document.getElementById('f-from'),
  to:   document.getElementById('f-to'),
  src:  document.getElementById('f-src'),
  tgt:  document.getElementById('f-tgt'),
  types:document.getElementById('f-types'),
  limit:document.getElementById('f-limit'),
  rows: document.getElementById('rows'),
  count:document.getElementById('s-count'),
  offset:document.getElementById('s-offset'),
  trunc:document.getElementById('s-truncated'),
  prev: document.getElementById('btn-prev'),
  next: document.getElementById('btn-next'),
};
let currentOffset = 0;
let currentTruncated = false;

function buildQuery(extra = {}) {
  const p = new URLSearchParams();
  if (els.from.value)  p.set('since', els.from.value);
  if (els.to.value)    p.set('until', els.to.value);
  if (els.src.value)   p.set('src', els.src.value);
  if (els.tgt.value)   p.set('tgt', els.tgt.value);
  if (els.types.value) p.set('types', els.types.value);
  for (const [k, v] of Object.entries(extra)) p.set(k, v);
  return p.toString();
}

function describe(ev) {
  switch (ev.type) {
    case 'voice_call':
      return `${ev.is_cap_plus ? 'Cap+ ' : ''}${ev.is_txi ? 'TXI ' : ''}call`;
    case 'lrrp_position':
      return ev.lat != null ? `(${ev.lat.toFixed(5)}, ${ev.lon.toFixed(5)})` : '—';
    case 'preamble_csbk':
      return `${ev.addressing}/${ev.kind}`;
    case 'data_header':
      return ev.delivery;
    case 'ip_mapping':
      return `${ev.role} ${ev.ip}:${ev.port}`;
    case 'lrrp_request':
      return ev.direction;
    case 'encryption':
      return `FLCO=${ev.flco} FID=${ev.fid}`;
    case 'site_info':
      return `site=${ev.site} rest_lsn=${ev.rest_lsn}`;
    case 'channel_status':
      return `rest_lsn=${ev.rest_lsn} ${ev.block_type}`;
    case 'lsn_status': {
      const a = (ev.states || []).filter(s => s.state === 'Active')
                                 .map(s => `LSN${s.lsn}→TG${s.tg}`).join(' ');
      return a || 'all idle';
    }
    case 'bank_call':
      return `bank=${ev.bank}`;
    case 'quality':
      return ev.error_type;
    default:
      return '';
  }
}

function fmtTime(iso) {
  if (!iso) return '—';
  // iso is "2026-05-15T09:00:25.123" naive — show date+time.
  return iso.replace('T', ' ').split('.')[0];
}

function escapeHTML(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  }[c]));
}

function getSrcOrRadio(ev) {
  if (ev.src != null) return ev.src;
  if (ev.radio_id != null) return ev.radio_id;
  return null;
}

function render(events) {
  if (!events.length) {
    els.rows.innerHTML = '<tr><td colspan="7" class="empty">No events match these filters.</td></tr>';
    return;
  }
  els.rows.innerHTML = events.map(ev => {
    const src = getSrcOrRadio(ev);
    const tgt = ev.tgt;
    const slot = ev.slot;
    const raw = escapeHTML(ev.raw_line || '');
    const evType = escapeHTML(ev.type);
    // data-label drives the mobile card view (td::before in style.css).
    return `
      <tr>
        <td class="t-time" data-label="">${escapeHTML(fmtTime(ev.timestamp))}</td>
        <td data-label=""><span class="t-type ${evType}">${evType}</span></td>
        <td data-label="SRC">${src != null
          ? `<a href="/?dossier=${encodeURIComponent(src)}" title="Open Dossier"
                style="color:var(--blue);text-decoration:none">${escapeHTML(src)}</a>`
          : '<span class="muted">—</span>'}</td>
        <td data-label="TGT">${tgt != null ? escapeHTML(tgt) : '<span class="muted">—</span>'}</td>
        <td data-label="Slot">${slot != null ? escapeHTML(slot) : '<span class="muted">—</span>'}</td>
        <td data-label="Summary">${escapeHTML(describe(ev))}</td>
        <td class="t-raw" data-label="Raw" title="${raw}">${raw}</td>
      </tr>`;
  }).join('');
}

async function search(offset = 0) {
  els.rows.innerHTML = '<tr><td colspan="7" class="empty">Loading…</td></tr>';
  currentOffset = offset;
  const limit = parseInt(els.limit.value, 10);
  const q = buildQuery({ limit, offset });
  let data;
  try {
    const r = await fetch('/api/history?' + q);
    if (!r.ok) {
      els.rows.innerHTML = `<tr><td colspan="7" class="empty">Server error: ${r.status}</td></tr>`;
      return;
    }
    data = await r.json();
  } catch (e) {
    els.rows.innerHTML = `<tr><td colspan="7" class="empty">Network error: ${e}</td></tr>`;
    return;
  }
  els.count.textContent = data.events.length;
  els.offset.textContent = data.offset;
  currentTruncated = !!data.truncated;
  els.trunc.style.display = currentTruncated ? '' : 'none';
  els.prev.disabled = data.offset === 0;
  els.next.disabled = !currentTruncated;
  render(data.events);
}

function resetAndSearch() { search(0); }

document.getElementById('btn-clear').addEventListener('click', () => {
  els.from.value = ''; els.to.value = '';
  els.src.value = ''; els.tgt.value = '';
  els.types.value = 'voice_call,lrrp_position,encryption,quality';
  els.limit.value = '500';
  resetAndSearch();
});
document.getElementById('btn-csv').addEventListener('click', () => {
  window.location.href = '/api/history.csv?' + buildQuery();
});
els.prev.addEventListener('click', () => {
  const limit = parseInt(els.limit.value, 10);
  search(Math.max(0, currentOffset - limit));
});
els.next.addEventListener('click', () => {
  const limit = parseInt(els.limit.value, 10);
  search(currentOffset + limit);
});

// Version tag comes from /assets/shared.js.

// First load: show today's traffic by default, no need to click anything.
(function defaultRange() {
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
  const pad = n => String(n).padStart(2, '0');
  const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  els.from.value = fmt(start);
})();
resetAndSearch();
</script>
</body>
</html>
