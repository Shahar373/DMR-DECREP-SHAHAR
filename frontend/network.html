<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMR Cap+ — Talker Network</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.0/dist/cytoscape.min.js"></script>
<link rel="stylesheet" href="/assets/style.css">
<script src="/assets/shared.js" defer></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
/* Tokens (--bg, --blue, ...) come from /assets/style.css. */
body { font-family: ui-monospace, 'Cascadia Code', monospace;
       background: var(--bg); color: var(--text); font-size: 13px;
       min-height: 100vh; overflow: hidden; }
header {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 10px 16px; display: flex; align-items: center; gap: 16px;
  flex-wrap: wrap;
}
header h1 { font-size: 14px; font-weight: 700; color: var(--blue); }
header .meta { margin-left: auto; color: var(--muted); font-size: 11px; }
header .meta span { color: var(--text); }

.toolbar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 8px 16px; display: flex; align-items: center; gap: 16px;
  flex-wrap: wrap;
}
.toolbar label {
  display: inline-flex; align-items: center; gap: 6px; color: var(--muted);
  font-size: 12px;
}
.toolbar select, .toolbar input[type="range"] {
  background: var(--bg3); color: var(--text); border: 1px solid var(--border);
  padding: 3px 6px; font: inherit; border-radius: 3px;
}
.toolbar .val { color: var(--text); font-weight: 700; min-width: 24px; text-align: right; }
.legend { display: inline-flex; align-items: center; gap: 10px; margin-left: auto; }
.legend .swatch {
  display: inline-block; width: 24px; height: 3px; vertical-align: middle;
  margin-right: 4px;
}
.legend .swatch.group { background: var(--blue); }
.legend .swatch.private { background: var(--orange); }

#layout { display: grid; grid-template-columns: 1fr 320px; height: calc(100vh - 88px); }
#cy { background: var(--bg); }
#sidepane {
  background: var(--bg2); border-left: 1px solid var(--border);
  overflow-y: auto; padding: 12px 14px;
}
#sidepane h2 {
  font-size: 11px; color: var(--muted); text-transform: uppercase;
  letter-spacing: .05em; margin-bottom: 8px;
}
#sidepane .empty { color: var(--muted); font-size: 12px; padding: 20px 0; text-align: center; }
.edge-row {
  display: grid; grid-template-columns: 1fr 1fr auto; gap: 6px;
  align-items: baseline; padding: 5px 0;
  border-bottom: 1px dashed var(--border); font-size: 12px;
}
.edge-row:last-child { border-bottom: none; }
.edge-row .id { color: var(--blue); cursor: pointer; }
.edge-row .id:hover { color: var(--text); text-decoration: underline; }
.edge-row .id.private { color: var(--orange); }
.edge-row .w { color: var(--text); font-weight: 700; }
.edge-row .kind { color: var(--muted); font-size: 10px; }

#status { color: var(--muted); font-size: 11px; margin-top: 8px; }
</style>
</head>
<body class="page-network">

<header>
  <h1>DMR Cap+ Talker Network</h1>
  <nav class="nav" data-shared-nav></nav>
  <div class="meta">
    Nodes: <span id="m-nodes">—</span> ·
    Edges: <span id="m-edges">—</span> ·
    Generated: <span id="m-gen">—</span>
  </div>
</header>

<div class="toolbar">
  <label>Window:
    <select id="f-window">
      <option value="300">5m</option>
      <option value="900">15m</option>
      <option value="3600" selected>1h</option>
      <option value="21600">6h</option>
      <option value="86400">24h</option>
    </select>
  </label>
  <label>Min weight:
    <input type="range" id="f-min" min="1" max="20" value="2">
    <span class="val" id="f-min-val">2</span>
  </label>
  <span class="legend">
    <span><span class="swatch group"></span>group co-presence</span>
    <span><span class="swatch private"></span>private direct</span>
  </span>
</div>

<div id="layout">
  <div id="cy"></div>
  <div id="sidepane">
    <h2>Top Edges</h2>
    <div id="edges-list"><div class="empty">Loading…</div></div>
    <div id="status"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const fmtId = id => String(id).padStart(3, '0');

let cy = cytoscape({
  container: $('cy'),
  elements: [],
  style: [
    { selector: 'node', style: {
        'background-color': '#21262d',
        'border-width': 2,
        'border-color': '#58a6ff',
        'label': 'data(label)',
        'color': '#e6edf3',
        'font-size': '11px',
        'font-family': 'ui-monospace, monospace',
        'text-valign': 'center',
        'text-halign': 'center',
        'width': 'data(size)',
        'height': 'data(size)',
    }},
    { selector: 'node[?hasGps]', style: { 'border-color': '#3fb950' }},
    { selector: 'edge', style: {
        'width': 'data(width)',
        'curve-style': 'bezier',
        'opacity': 0.75,
    }},
    { selector: 'edge[kind="group"]', style: { 'line-color': '#58a6ff' }},
    { selector: 'edge[kind="private"]', style: { 'line-color': '#f0883e', 'line-style': 'dashed' }},
    { selector: 'node:active, node:selected', style: { 'border-color': '#d29922', 'border-width': 4 }},
  ],
  layout: { name: 'cose', animate: false, idealEdgeLength: 110, nodeRepulsion: 8000 },
  wheelSensitivity: 0.2,
});

cy.on('tap', 'node', evt => {
  const id = evt.target.id();
  window.location = '/?dossier=' + encodeURIComponent(id);
});

let lastSignature = null;
// Keep the canvas sized correctly across orientation/viewport changes.
window.addEventListener('resize', () => { cy.resize(); });

async function refresh() {
  const w = $('f-window').value;
  const m = $('f-min').value;
  $('status').textContent = 'Loading…';
  const resp = await fetch(`/api/network?window=${w}&min_weight=${m}&limit=500`);
  if (!resp.ok) { $('status').textContent = 'Error: ' + resp.status; return; }
  const data = await resp.json();
  $('m-nodes').textContent = data.nodes.length;
  $('m-edges').textContent = data.edges.length;
  $('m-gen').textContent = (data.generated_at || '').split('.')[0].replace('T', ' ');

  const els = [];
  // Scale node size by total_calls (log-ish).
  const maxCalls = Math.max(1, ...data.nodes.map(n => n.total_calls));
  for (const n of data.nodes) {
    const size = 22 + Math.round(28 * Math.log1p(n.total_calls) / Math.log1p(maxCalls));
    els.push({ data: { id: String(n.id), label: fmtId(n.id), size, hasGps: !!n.has_gps }});
  }
  const maxW = Math.max(1, ...data.edges.map(e => e.weight));
  for (const e of data.edges) {
    const width = 1 + Math.round(6 * (e.weight / maxW));
    els.push({ data: {
        id: `e_${e.src_a}_${e.src_b}_${e.kind}`,
        source: String(e.src_a), target: String(e.src_b),
        kind: e.kind, weight: e.weight, width, tgs: e.tgs.join(','),
    }});
  }
  // Re-running the cose force layout is the most expensive step on this
  // page (very visible on mobile CPUs). Skip it when the graph topology
  // hasn't changed — only weights/sizes get updated in place then.
  const signature = els.map(e => e.data.id).sort().join('|');
  if (signature === lastSignature) {
    for (const e of els) {
      const existing = cy.getElementById(e.data.id);
      if (existing.length) existing.data(e.data);
    }
  } else {
    lastSignature = signature;
    cy.elements().remove();
    cy.add(els);
    cy.layout({ name: 'cose', animate: false, idealEdgeLength: 110, nodeRepulsion: 8000 }).run();
  }

  // Side list: top 25 edges.
  const list = $('edges-list');
  if (data.edges.length === 0) {
    list.innerHTML = '<div class="empty">No talker pairs in this window.</div>';
  } else {
    list.innerHTML = data.edges.slice(0, 25).map(e => `
      <div class="edge-row">
        <span class="id ${e.kind === 'private' ? 'private' : ''}"
              onclick="window.location='/?dossier=${e.src_a}'">${fmtId(e.src_a)}</span>
        <span class="id ${e.kind === 'private' ? 'private' : ''}"
              onclick="window.location='/?dossier=${e.src_b}'">${fmtId(e.src_b)}</span>
        <span><span class="w">${e.weight}</span> <span class="kind">${e.kind}</span></span>
      </div>
    `).join('');
  }
  $('status').textContent = `${data.nodes.length} nodes · ${data.edges.length} edges · window ${w}s · min weight ${m}`;
}

$('f-window').addEventListener('change', refresh);
$('f-min').addEventListener('input', () => { $('f-min-val').textContent = $('f-min').value; });
$('f-min').addEventListener('change', refresh);
refresh();
</script>
</body>
</html>
