<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMR Cap+ Monitor</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0d1117;
  --bg2:     #161b22;
  --bg3:     #21262d;
  --border:  #30363d;
  --text:    #e6edf3;
  --muted:   #8b949e;
  --green:   #3fb950;
  --blue:    #58a6ff;
  --yellow:  #d29922;
  --red:     #f85149;
  --purple:  #bc8cff;
}
body { font-family: ui-monospace, 'Cascadia Code', monospace;
       background: var(--bg); color: var(--text); font-size: 13px; height: 100vh;
       display: flex; flex-direction: column; overflow: hidden; }

/* ── Header ────────────────────────────────────────────────────── */
#header {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 8px 14px; display: flex; align-items: center; gap: 20px; flex-shrink: 0;
}
#header h1 { font-size: 14px; font-weight: 700; color: var(--blue); white-space: nowrap; }
.hitem { color: var(--muted); white-space: nowrap; }
.hitem span { color: var(--text); }
#conn {
  margin-left: auto; padding: 2px 8px; border-radius: 4px;
  font-size: 11px; font-weight: 600; background: var(--bg3);
}
#conn.ok   { color: var(--green); }
#conn.err  { color: var(--red); }
#conn.wait { color: var(--yellow); }

/* ── LSN bar ────────────────────────────────────────────────────── */
#lsn-bar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 6px 14px; display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap;
}
.lsn-chip {
  padding: 3px 10px; border-radius: 4px; border: 1px solid var(--border);
  font-size: 11px; font-weight: 600; background: var(--bg3); color: var(--muted);
  white-space: nowrap;
}
.lsn-chip.rest   { border-color: var(--blue);   color: var(--blue);   background: #1c2d45; }
.lsn-chip.active { border-color: var(--green);  color: var(--green);  background: #1a2f1e; }

/* ── Main area ──────────────────────────────────────────────────── */
#main {
  flex: 1; display: grid; overflow: hidden;
  grid-template-columns: 280px 1fr;
  grid-template-rows: auto 1fr;
}

/* ── Active calls panel ─────────────────────────────────────────── */
#calls-panel {
  grid-row: 1 / 3; background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
#calls-panel h2 { padding: 8px 12px; font-size: 12px; color: var(--muted);
                  border-bottom: 1px solid var(--border); text-transform: uppercase;
                  letter-spacing: .05em; flex-shrink: 0; }
#calls-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
.call-card {
  background: var(--bg3); border: 1px solid var(--border);
  border-left: 3px solid var(--green); border-radius: 6px; padding: 8px 10px;
}
.call-card.enc { border-left-color: var(--purple); }
.call-src  { font-size: 15px; font-weight: 700; color: var(--text); }
.call-tg   { font-size: 11px; color: var(--muted); }
.call-meta { font-size: 10px; color: var(--muted); margin-top: 4px; }
.call-meta .tag {
  display: inline-block; padding: 1px 5px; border-radius: 3px;
  margin-right: 4px; background: var(--bg2); border: 1px solid var(--border);
}
.call-meta .tag.enc-tag { color: var(--purple); border-color: var(--purple); }
.call-meta .tag.cap-tag { color: var(--blue);   border-color: var(--blue); }
#no-calls { color: var(--muted); font-size: 12px; text-align: center; padding: 20px; }

/* ── Map ────────────────────────────────────────────────────────── */
#map-wrap {
  grid-row: 1 / 2; position: relative; min-height: 260px;
  border-bottom: 1px solid var(--border);
}
#map { width: 100%; height: 100%; }
#map-placeholder {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; color: var(--muted); font-size: 12px;
  background: var(--bg); pointer-events: none; z-index: 500;
}

/* ── Radios table ───────────────────────────────────────────────── */
#radios-wrap {
  grid-row: 2 / 3; overflow: auto;
  border-top: 1px solid var(--border);
}
table { width: 100%; border-collapse: collapse; }
thead { position: sticky; top: 0; background: var(--bg2); z-index: 1; }
th {
  padding: 5px 10px; text-align: left; font-size: 11px; font-weight: 600;
  color: var(--muted); text-transform: uppercase; letter-spacing: .05em;
  border-bottom: 1px solid var(--border); cursor: pointer; white-space: nowrap;
  user-select: none;
}
th:hover { color: var(--blue); }
th.sort-asc::after  { content: " ↑"; color: var(--blue); }
th.sort-desc::after { content: " ↓"; color: var(--blue); }
td {
  padding: 5px 10px; border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tr:hover td { background: var(--bg3); }
tr.active-row td { background: #1a2f1e; }
.badge {
  display: inline-block; padding: 1px 6px; border-radius: 3px;
  font-size: 10px; font-weight: 600; border: 1px solid;
}
.badge-enc  { color: var(--purple); border-color: var(--purple); }
.badge-pos  { color: var(--green);  border-color: var(--green);  }
.badge-no   { color: var(--muted);  border-color: var(--border); }
.muted { color: var(--muted); }

/* ── Quality footer ─────────────────────────────────────────────── */
#footer {
  background: var(--bg2); border-top: 1px solid var(--border);
  padding: 4px 14px; display: flex; gap: 20px; flex-shrink: 0;
  font-size: 11px; color: var(--muted);
}
#footer span { color: var(--text); }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <h1>DMR Cap+ Monitor</h1>
  <div class="hitem">Site: <span id="h-site">—</span></div>
  <div class="hitem">Rest LSN: <span id="h-rest">—</span></div>
  <div class="hitem">Radios: <span id="h-radios">0</span></div>
  <div class="hitem">Calls: <span id="h-calls">0</span></div>
  <div id="conn" class="wait">Connecting…</div>
</div>

<!-- LSN channel bar -->
<div id="lsn-bar"></div>

<!-- Main grid: left=calls, right top=map, right bottom=radios -->
<div id="main">
  <div id="calls-panel">
    <h2>Active Calls</h2>
    <div id="calls-list"><div id="no-calls">No active calls</div></div>
  </div>

  <div id="map-wrap">
    <div id="map"></div>
    <div id="map-placeholder">No GPS positions yet</div>
  </div>

  <div id="radios-wrap">
    <table>
      <thead>
        <tr>
          <th data-col="id">Radio ID</th>
          <th data-col="last_seen">Last Seen</th>
          <th data-col="voice_frame_count">Frames</th>
          <th data-col="last_tg">Last TG</th>
          <th data-col="last_slot">Slot</th>
          <th data-col="last_call_was_encrypted">Enc</th>
          <th data-col="last_position">GPS</th>
          <th data-col="ip">IP</th>
        </tr>
      </thead>
      <tbody id="radio-tbody"></tbody>
    </table>
  </div>
</div>

<!-- Quality footer -->
<div id="footer">
  <div>CSBK CRC: <span id="q-csbk-crc">0</span></div>
  <div>CSBK FEC: <span id="q-csbk-fec">0</span></div>
  <div>CACH FEC: <span id="q-cach-fec">0</span></div>
  <div>SLCO CRC: <span id="q-slco-crc">0</span></div>
  <div>Events: <span id="q-total">0</span></div>
  <div style="margin-left:auto">Updated: <span id="q-ts">—</span></div>
</div>

<script>
// ── Map setup ─────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([32.08, 34.80], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap',
  maxZoom: 18,
}).addTo(map);

const radioMarkers = {};  // radio_id → L.Marker
const radioTrails  = {};  // radio_id → L.Polyline

function makeIcon(radioId, isActive) {
  const color = isActive ? '#3fb950' : '#58a6ff';
  return L.divIcon({
    className: '',
    iconSize: [28, 28],
    iconAnchor: [14, 14],
    html: `<div style="background:${color};color:#0d1117;border-radius:50%;
                width:28px;height:28px;display:flex;align-items:center;
                justify-content:center;font-size:9px;font-weight:700;
                border:2px solid #0d1117;box-shadow:0 0 4px ${color}">${radioId}</div>`,
  });
}

function updateMap(snapshot) {
  const hasPos = Object.values(snapshot.radios).some(r => r.last_position);
  document.getElementById('map-placeholder').style.display = hasPos ? 'none' : '';

  const activeIds = new Set(
    Object.values(snapshot.active_calls).map(c => c.src)
  );

  for (const [rid, radio] of Object.entries(snapshot.radios)) {
    const id = parseInt(rid);
    if (!radio.last_position) continue;
    const { lat, lon } = radio.last_position;
    const isActive = activeIds.has(id);
    const icon = makeIcon(id, isActive);

    if (radioMarkers[id]) {
      radioMarkers[id].setLatLng([lat, lon]).setIcon(icon);
    } else {
      radioMarkers[id] = L.marker([lat, lon], { icon })
        .bindTooltip(`Radio ${id}`, { permanent: false })
        .addTo(map);
    }

    // Trail
    if (radio.position_history && radio.position_history.length > 1) {
      const pts = radio.position_history.map(p => [p.lat, p.lon]);
      if (radioTrails[id]) {
        radioTrails[id].setLatLngs(pts);
      } else {
        radioTrails[id] = L.polyline(pts, { color: '#58a6ff', weight: 1.5, opacity: 0.5 }).addTo(map);
      }
    }
  }
}

// ── Sort state ────────────────────────────────────────────────────
let sortCol = 'last_seen';
let sortDir = -1;  // -1 = desc (newest first)

document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) {
      sortDir = -sortDir;
    } else {
      sortCol = col;
      sortDir = -1;
    }
    document.querySelectorAll('th[data-col]').forEach(t => {
      t.classList.remove('sort-asc', 'sort-desc');
    });
    th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
    if (lastSnap) renderRadios(lastSnap);
  });
});

// ── Rendering ─────────────────────────────────────────────────────
let lastSnap = null;

function fmt(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleTimeString('en-GB', { hour12: false });
}

function renderLSN(snap) {
  const bar = document.getElementById('lsn-bar');
  bar.innerHTML = '';
  const states = snap.system.lsn_states || {};
  if (!Object.keys(states).length) {
    bar.innerHTML = '<span style="color:var(--muted);font-size:11px">No LSN data yet</span>';
    return;
  }
  const rest = snap.system.rest_lsn;
  Object.entries(states)
    .sort(([a], [b]) => parseInt(a) - parseInt(b))
    .forEach(([lsn, s]) => {
      const chip = document.createElement('span');
      chip.className = 'lsn-chip ' + (s.state === 'Active' ? 'active' : s.state === 'Rest' ? 'rest' : '');
      const star = parseInt(lsn) === rest ? '★ ' : '';
      chip.textContent = `${star}LSN ${lsn}: ${s.state}${s.tg ? ' TG' + s.tg : ''}`;
      bar.appendChild(chip);
    });
}

function renderCalls(snap) {
  const list = document.getElementById('calls-list');
  const calls = Object.values(snap.active_calls);
  if (!calls.length) {
    list.innerHTML = '<div id="no-calls">No active calls</div>';
    return;
  }
  list.innerHTML = '';
  calls.sort((a, b) => a.slot - b.slot).forEach(c => {
    const dur = ((new Date(snap.generated_at) - new Date(c.started_at)) / 1000).toFixed(0);
    const div = document.createElement('div');
    div.className = 'call-card' + (c.is_encrypted ? ' enc' : '');
    div.innerHTML = `
      <div class="call-src">Radio ${c.src}</div>
      <div class="call-tg">→ TG ${c.tgt}  (Slot ${c.slot})</div>
      <div class="call-meta">
        <span class="tag">${c.frame_count} frames</span>
        <span class="tag">${dur}s</span>
        ${c.is_encrypted ? '<span class="tag enc-tag">ENC</span>' : ''}
        ${c.is_cap_plus  ? '<span class="tag cap-tag">Cap+</span>' : ''}
        ${c.rest_lsn != null ? `<span class="tag">rest=${c.rest_lsn}</span>` : ''}
      </div>`;
    list.appendChild(div);
  });
}

function renderRadios(snap) {
  const activeIds = new Set(Object.values(snap.active_calls).map(c => c.src));
  let rows = Object.values(snap.radios);

  rows.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (va == null) va = '';
    if (vb == null) vb = '';
    if (sortCol === 'last_seen' || sortCol === 'id' || sortCol === 'voice_frame_count'
        || sortCol === 'last_tg' || sortCol === 'last_slot') {
      va = Number(va) || 0;
      vb = Number(vb) || 0;
    } else if (typeof va === 'string') {
      va = va.toLowerCase();
      vb = vb.toLowerCase();
    }
    if (va < vb) return -sortDir;
    if (va > vb) return  sortDir;
    return 0;
  });

  const tbody = document.getElementById('radio-tbody');
  tbody.innerHTML = '';
  rows.forEach(r => {
    const isActive = activeIds.has(r.id);
    const tr = document.createElement('tr');
    if (isActive) tr.className = 'active-row';
    const gps = r.last_position
      ? `<span class="badge badge-pos">GPS</span>`
      : `<span class="badge badge-no">—</span>`;
    const enc = r.last_call_was_encrypted
      ? `<span class="badge badge-enc">ENC</span>`
      : `<span class="muted">—</span>`;
    tr.innerHTML = `
      <td><strong>${r.id}</strong>${isActive ? ' <span style="color:var(--green)">●</span>' : ''}</td>
      <td>${fmt(r.last_seen)}</td>
      <td>${r.voice_frame_count}</td>
      <td>${r.last_tg ?? '<span class="muted">—</span>'}</td>
      <td>${r.last_slot ?? '<span class="muted">—</span>'}</td>
      <td>${enc}</td>
      <td>${gps}</td>
      <td class="muted">${r.ip ?? '—'}</td>`;
    tbody.appendChild(tr);
  });
}

function renderQuality(snap) {
  const q = snap.quality;
  document.getElementById('q-csbk-crc').textContent = q.csbk_crc;
  document.getElementById('q-csbk-fec').textContent = q.csbk_fec;
  document.getElementById('q-cach-fec').textContent = q.cach_burst_fec;
  document.getElementById('q-slco-crc').textContent = q.slco_crc;
  document.getElementById('q-total').textContent    = q.total_events_seen;
  document.getElementById('q-ts').textContent       = fmt(snap.generated_at);
}

function renderHeader(snap) {
  document.getElementById('h-site').textContent  = snap.system.site ?? '—';
  document.getElementById('h-rest').textContent  = snap.system.rest_lsn ?? '—';
  document.getElementById('h-radios').textContent = Object.keys(snap.radios).length;
  document.getElementById('h-calls').textContent  = Object.keys(snap.active_calls).length;
}

function render(snap) {
  lastSnap = snap;
  renderHeader(snap);
  renderLSN(snap);
  renderCalls(snap);
  renderRadios(snap);
  renderQuality(snap);
  updateMap(snap);
}

// ── WebSocket with auto-reconnect ─────────────────────────────────
const connEl = document.getElementById('conn');
let ws = null;
let reconnectDelay = 1000;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    connEl.textContent = 'Live';
    connEl.className = 'ok';
    reconnectDelay = 1000;
  };

  ws.onmessage = e => {
    try { render(JSON.parse(e.data)); } catch (_) {}
  };

  ws.onclose = ws.onerror = () => {
    connEl.textContent = `Reconnecting in ${reconnectDelay / 1000}s…`;
    connEl.className = 'err';
    setTimeout(() => {
      reconnectDelay = Math.min(reconnectDelay * 2, 16000);
      connect();
    }, reconnectDelay);
  };
}

connect();

// Keep the map from going stale when window is resized.
window.addEventListener('resize', () => map.invalidateSize());
</script>
</body>
</html>
